server {
  listen 80;
  listen [::]:80;
  server_name luckyjet.cash www.luckyjet.cash;

  return 301 https://luckyjet.cash$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name www.luckyjet.cash;

  ssl_certificate     /etc/letsencrypt/live/luckyjet.cash/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/luckyjet.cash/privkey.pem;

  return 301 https://luckyjet.cash$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name luckyjet.cash;

  root /var/www/lucky;
  index index.html;

  ssl_certificate     /etc/letsencrypt/live/luckyjet.cash/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/luckyjet.cash/privkey.pem;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location = /robots.txt {
    try_files $uri =404;
    access_log off;
  }

  location = /sitemap.xml {
    try_files $uri =404;
    access_log off;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
